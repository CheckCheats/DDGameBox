name: Steam Depot Downloader

on:
  workflow_dispatch:
    inputs:
      appid:
        description: 'Steam App ID'
        required: true
        type: string
      depots_json:
        description: 'JSON参数模式: [{"id":...,"manifestId":"...","key":"..."}]'
        required: false
        default: ''
        type: string
      data_path:
        description: 'data/ 目录下的 ZIP base64 文件路径 (Release模式, 自动解码)'
        required: false
        default: ''
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download DepotDownloader
        run: python3 scripts/download.py download-dd

      - name: Fetch data file
        if: inputs.data_path != ''
        run: python3 scripts/download.py fetch-data '${{ inputs.data_path }}'

      - name: Download depots
        run: python3 scripts/download.py run "${{ inputs.appid }}" '${{ inputs.depots_json }}'

      - name: Package game
        run: python3 scripts/download.py package "${{ inputs.appid }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: steam-game-${{ inputs.appid }}
          path: game.zip
          retention-days: 7

      - name: Cleanup data file
        if: inputs.data_path != '' && always()
        run: python3 scripts/download.py delete-data '${{ inputs.data_path }}'