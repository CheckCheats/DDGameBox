name: Steam Depot Downloader

on:
  workflow_dispatch:
    inputs:
      appid:
        description: 'Steam App ID'
        required: true
        type: string
      depots_json:
        description: 'JSON参数模式: [{"id":...}] (留空则用 Release 模式)'
        required: false
        default: ''
        type: string
      release_tag:
        description: 'Release tag (Release 模式, 从 asset 读取 depots.json)'
        required: false
        default: ''
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download DepotDownloader
        run: python3 scripts/download.py download-dd

      - name: Fetch Release asset
        if: inputs.release_tag != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: python3 scripts/download.py fetch-release "${{ github.repository }}" "${{ inputs.release_tag }}"

      - name: Download depots
        run: python3 scripts/download.py run "${{ inputs.appid }}" '${{ inputs.depots_json }}'

      - name: Package game
        run: python3 scripts/download.py package "${{ inputs.appid }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: steam-game-${{ inputs.appid }}
          path: game.zip
          retention-days: 7

      - name: Cleanup Release asset
        if: inputs.release_tag != '' && always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: python3 scripts/download.py cleanup-release "${{ github.repository }}" "${{ inputs.release_tag }}"
