name: Steam Depot Downloader

on:
  workflow_dispatch:
    inputs:
      appid:
        description: 'Steam App ID'
        required: true
        type: string
      depots_json:
        description: 'JSON: [{"id":2253101,"manifestId":"...","key":"..."}]'
        required: true
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download DepotDownloader
        run: python3 scripts/download.py download-dd

      - name: Download depots
        run: python3 scripts/download.py run "${{ inputs.appid }}" '${{ inputs.depots_json }}'

      - name: Package game
        run: python3 scripts/download.py package "${{ inputs.appid }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: steam-game-${{ inputs.appid }}
          path: game.zip
          retention-days: 7
