name: Steam Depot Downloader

on:
  workflow_dispatch:
    inputs:
      request_id:
        description: '请求 UUID（对应 requests/ 目录下的 JSON 文件）'
        required: true
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read request
        id: request
        run: |
          REQ_FILE="requests/${{ inputs.request_id }}.json"
          if [ ! -f "$REQ_FILE" ]; then
            echo "::error::Request file not found: $REQ_FILE"
            exit 1
          fi
          echo "size=$(wc -c < "$REQ_FILE")" >> "$GITHUB_OUTPUT"

      - name: Write manifest files
        run: python3 scripts/download.py prepare "${{ inputs.request_id }}"

      - name: Download DepotDownloader
        run: python3 scripts/download.py download-dd

      - name: Download depots
        run: python3 scripts/download.py run "${{ inputs.request_id }}"

      - name: Package game
        run: python3 scripts/download.py package "${{ inputs.request_id }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: steam-game-${{ inputs.request_id }}
          path: game-${{ inputs.request_id }}.zip
          retention-days: 7

      - name: Cleanup request file
        env:
          GH_TOKEN: ${{ github.token }}
        run: python3 scripts/download.py cleanup "${{ inputs.request_id }}"
